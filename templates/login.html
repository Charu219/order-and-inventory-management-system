<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Inventory System</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            background: linear-gradient(135deg, #1e293b, #334155);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* LOGIN CARD */
        .login-card {
            background: #ffffff;
            width: 420px;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 8px;
            color: #1f2937;
        }

        .login-card p {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* INPUT GROUP */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            color: #374151;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 15px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }

        /* LOGIN BUTTON */
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .login-btn:hover {
            background: #1e40af;
        }

        /* DIVIDER */
        .divider {
            margin: 25px 0;
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
        }

        /* REGISTER LINK */
        .register-link {
            text-align: center;
            font-size: 14px;
        }

        .register-link a {
            color: #2563eb;
            font-weight: bold;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* BRAND */
        .brand {
            text-align: center;
            margin-bottom: 20px;
        }

        .brand h1 {
            font-size: 26px;
            color: #2563eb;
            margin-bottom: 5px;
        }

        .brand span {
            font-size: 13px;
            color: #6b7280;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="brand">
        <h1>Inventory System</h1>
        <span>Order & Stock Management</span>
    </div>

    <h2>Welcome Back 👋</h2>
    <p>Please login to your account</p>

    <form method="POST" action="/login">

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>

    </form>

    <div class="divider">──────── OR ────────</div>

    <div class="register-link">
        New user? <a href="/register">Create an account</a>
    </div>

</div>

</body>
</html>
