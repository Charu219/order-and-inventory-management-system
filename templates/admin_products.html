<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Products | Inventory System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body { background: #f6f8fb; font-family: Arial; }
         .navbar {
            background: #2c3e50;
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            color: #fff;
            font-size: 28px;
            margin: 0;
        }

        .navbar a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        .navbar a:hover {
            color: #1abc9c;
        }
        .container { max-width: 1100px; margin: 40px auto; }
        .card { background: #fff; padding: 25px; border-radius: 14px; box-shadow: 0 15px 30px rgba(0,0,0,0.08); margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; border-bottom: 1px solid #e5e7eb; }
        th { background: #f1f5f9; }
        .badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .in { background: #dcfce7; color: #166534; }
        .low { background: #fef9c3; color: #854d0e; }
        .out { background: #fee2e2; color: #7f1d1d; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; }
        .btn-delete:hover { background: #dc2626; }
        .add-form { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .add-form input { padding: 10px; }
        .add-form button { background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>

<body>

<div class="navbar">
    <h1>Inventory System</h1>
    <div>
        <a href="/dashboard">Dashboard</a>
        <a href="/admin/products">Products</a>
        <a href="/admin/orders">Orders</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">

    <!-- ADD PRODUCT -->
    <div class="card">
        <h2>➕ Add Product</h2>
        <form method="post">
            <div class="add-form">
                <input type="text" name="name" placeholder="Product Name" required>
                <input type="number" name="price" placeholder="Price" required>
                <input type="number" name="stock" placeholder="Stock" required>
                <button type="submit">Add Product</button>
            </div>
        </form>
    </div>

    <!-- PRODUCT LIST -->
    <div class="card">
        <h2>📦 Product List</h2>
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price (₹)</th>
                <th>Stock</th>
                <th>Status</th>
                <th>Action</th>
            </tr>

            {% for p in products %}
            <tr>
                <td>{{ p[0] }}</td>
                <td>{{ p[1] }}</td>
                <td>₹ {{ p[2] }}</td>
                <td>{{ p[3] }}</td>

                <td>
                    {% if p[3] > 10 %}
                        <span class="badge in">In Stock</span>
                    {% elif p[3] > 0 %}
                        <span class="badge low">Low</span>
                    {% else %}
                        <span class="badge out">Out</span>
                    {% endif %}
                </td>

                <td>
                    <form action="{{ url_for('delete_product', product_id=p[0]) }}"
                          method="POST"
                          onsubmit="return confirm('Delete this product?');">
                        <button type="submit" class="btn-delete">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>

</body>
</html>
